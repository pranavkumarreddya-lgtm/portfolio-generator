<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus AI | Pro Portfolio</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root { --gold: #c5a059; --bg: #0a0a0a; }
        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); color: white; overflow-x: hidden; }

        /* REAL METALLIC DOORS */
        .door { position: fixed; top: 0; width: 50%; height: 100%; background: #1a1a1a; z-index: 100; transition: 1.5s cubic-bezier(0.7, 0, 0.3, 1); border: 2px solid #333; display: flex; align-items: center; justify-content: center; box-shadow: inset 0 0 50px rgba(0,0,0,0.8); }
        .left-door { left: 0; border-right: 4px solid var(--gold); }
        .right-door { right: 0; border-left: 4px solid var(--gold); }
        .open .left-door { transform: translateX(-100%); }
        .open .right-door { transform: translateX(100%); }

        /* AUTH BOX */
        .auth-card { position: fixed; z-index: 110; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #111; padding: 40px; border-radius: 20px; border: 1px solid var(--gold); text-align: center; width: 300px; transition: 0.5s; }
        .open .auth-card { opacity: 0; pointer-events: none; }
        
        input, textarea { width: 100%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid #333; color: white; border-radius: 8px; box-sizing: border-box; }
        .btn { background: var(--gold); color: black; border: none; padding: 15px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px; }
        #cap-disp { background: #000; padding: 10px; margin: 10px 0; font-weight: 900; letter-spacing: 8px; color: var(--gold); border: 1px dashed var(--gold); font-size: 20px; }

        /* PORTFOLIO CONTENT (Fixed Visibility) */
        .main-container { padding: 40px 20px; display: none; max-width: 900px; margin: 0 auto; z-index: 10; position: relative; }
        .open .main-container { display: block !important; }

        .resume-page { background: white; color: #333; padding: 40px; border-radius: 5px; display: flex; gap: 30px; margin-top: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .p-photo { width: 120px; height: 120px; background: #eee; border: 2px solid var(--gold); object-fit: cover; }
    </style>
</head>
<body id="master">

    <div class="door left-door"></div>
    <div class="door right-door"></div>

    <div class="auth-card">
        <h2 style="color:var(--gold); margin:0;">LOGIN</h2>
        <input type="text" id="uname" placeholder="Username">
        <div id="cap-disp"></div>
        <input type="text" id="cap-in" placeholder="Captcha">
        <button class="btn" onclick="verify()">OPEN GATES 🔓</button>
    </div>

    <div class="main-container">
        <div id="f-box" style="background:#1a1a1a; padding:30px; border-radius:15px; border:1px solid #333;">
            <h2 style="color:var(--gold)">DETAILS</h2>
            <input type="text" id="fn" placeholder="Full Name">
            <input type="text" id="fr" placeholder="Role (e.g. Developer)">
            <input type="file" id="fp" accept="image/*" onchange="loadImg(event)">
            <textarea id="fs" placeholder="Skills..."></textarea>
            <textarea id="fpj" placeholder="Projects..."></textarea>
            <button class="btn" onclick="build()">GENERATE PORTFOLIO ✨</button>
        </div>

        <div id="r-wrap" style="display:none; margin-top:30px;">
            <div id="r-pdf" class="resume-page">
                <div style="flex:1; border-right:1px solid #ddd; padding-right:20px;">
                    <img id="r-img" class="p-photo" src="">
                    <h3 style="color:var(--gold)">SKILLS</h3>
                    <div id="r-skills"></div>
                </div>
                <div style="flex:2;">
                    <h1 id="r-name" style="margin:0"></h1>
                    <p id="r-role" style="font-weight:bold; color:#666"></p>
                    <h3 style="border-bottom:1px solid #eee">PROJECTS</h3>
                    <p id="r-projects" style="white-space:pre-line;"></p>
                </div>
            </div>
            <button class="btn" onclick="pdf()" style="background:#2ecc71">DOWNLOAD PDF 📄</button>
        </div>
    </div>

    <script>
        let code = Math.random().toString(36).substring(2, 7).toUpperCase();
        document.getElementById('cap-disp').innerText = code;

        function verify() {
            const u = document.getElementById('uname').value;
            const c = document.getElementById('cap-in').value.toUpperCase();
            if(u && c === code) {
                document.getElementById('master').classList.add('open');
            } else { alert("Auth Failed!"); }
        }

        let pData = "";
        function loadImg(e) {
            const r = new FileReader();
            r.onload = () => pData = r.result;
            r.readAsDataURL(e.target.files[0]);
        }

        function build() {
            document.getElementById('r-name').innerText = document.getElementById('fn').value;
            document.getElementById('r-role').innerText = document.getElementById('fr').value;
            document.getElementById('r-projects').innerText = document.getElementById('fpj').value;
            document.getElementById('r-skills').innerText = document.getElementById('fs').value;
            if(pData) document.getElementById('r-img').src = pData;
            
            document.getElementById('f-box').style.display = 'none';
            document.getElementById('r-wrap').style.display = 'block';
        }

        function pdf() {
            const e = document.getElementById('r-pdf');
            html2pdf().from(e).save('Portfolio.pdf');
        }
    </script>
</body>
</html>
