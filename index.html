<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus AI | Pro Portfolio System</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root { --gold: #c5a059; --metal: #2c2c2c; --bg: #121212; }
        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); color: white; overflow-x: hidden; }

        /* REAL METALLIC DOORS */
        .door { position: fixed; top: 0; width: 50%; height: 100%; background: linear-gradient(135deg, #1a1a1a 25%, #262626 50%, #1a1a1a 75%); z-index: 100; transition: 1.8s cubic-bezier(0.7, 0, 0.3, 1); border: 2px solid #333; display: flex; align-items: center; justify-content: center; box-shadow: inset 0 0 50px rgba(0,0,0,0.5); }
        .left-door { left: 0; border-right: 5px solid var(--gold); }
        .right-door { right: 0; border-left: 5px solid var(--gold); }
        .door-handle { width: 10px; height: 100px; background: var(--gold); border-radius: 5px; box-shadow: 0 0 15px rgba(197, 160, 89, 0.5); }
        
        .open .left-door { transform: translateX(-100%); }
        .open .right-door { transform: translateX(100%); }

        /* AUTHENTICATION BOX */
        .auth-card { position: fixed; z-index: 110; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #1a1a1a; padding: 40px; border-radius: 20px; border: 1px solid var(--gold); text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.8); transition: 0.5s; width: 320px; }
        .open .auth-card { opacity: 0; pointer-events: none; }
        
        input, textarea { width: 100%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid #333; color: white; border-radius: 8px; font-size: 14px; }
        .btn { background: var(--gold); color: black; border: none; padding: 15px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 15px; text-transform: uppercase; }
        #captcha-display { background: #000; padding: 10px; margin: 10px 0; font-weight: 900; letter-spacing: 8px; color: var(--gold); border: 1px dashed var(--gold); font-size: 20px; user-select: none; }

        /* PORTFOLIO DASHBOARD */
        .main-container { padding: 50px 20px; display: none; max-width: 1000px; margin: 0 auto; opacity: 0; transition: 2s; }
        .open .main-container { display: block; opacity: 1; }

        /* PROFESSIONAL RESUME LOOK */
        .resume-page { background: white; color: #333; padding: 60px; border-radius: 2px; box-shadow: 0 0 20px rgba(0,0,0,0.5); display: flex; gap: 40px; }
        .resume-sidebar { flex: 1; border-right: 1px solid #eee; padding-right: 20px; }
        .resume-main { flex: 2; }
        .p-photo { width: 150px; height: 150px; background: #eee; border: 2px solid var(--gold); object-fit: cover; border-radius: 5px; margin-bottom: 20px; }
        h2 { color: var(--gold); border-bottom: 1px solid #eee; padding-bottom: 5px; }
    </style>
</head>
<body id="master-body">

    <div class="door left-door"><div class="door-handle"></div></div>
    <div class="door right-door"><div class="door-handle"></div></div>

    <div class="auth-card" id="auth">
        <h2 style="margin-top:0;">SECURE ACCESS</h2>
        <input type="text" id="username" placeholder="Enter Username">
        <div id="captcha-display"></div>
        <input type="text" id="captcha-in" placeholder="Type Captcha Here">
        <button class="btn" onclick="verifyAuth()">AUTHENTICATE 🛡️</button>
    </div>

    <div class="main-container">
        <div id="input-form" class="auth-card" style="position:static; transform:none; width:100%; margin-bottom:50px;">
            <h2>PORTFOLIO GENERATOR</h2>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:20px;">
                <input type="text" id="fName" placeholder="Full Name">
                <input type="text" id="fRole" placeholder="Designation">
                <input type="text" id="fSkills" placeholder="Skills (comma separated)">
                <input type="file" id="fPhoto" accept="image/*" onchange="previewImg(event)">
            </div>
            <textarea id="fAbout" rows="4" placeholder="Professional Summary..."></textarea>
            <textarea id="fProjects" rows="4" placeholder="Projects (Project Name - Description)"></textarea>
            <button class="btn" onclick="buildResume()">GENERATE & VIEW ✨</button>
        </div>

        <div id="resume-wrap" style="display:none;">
            <div id="resume-pdf" class="resume-page">
                <div class="resume-sidebar">
                    <img id="resPhoto" class="p-photo" src="" alt="Profile">
                    <h2>CONTACT</h2>
                    <p style="font-size:12px;">Email: Secure Hub<br>Location: JNTUH R22</p>
                    <h2>SKILLS</h2>
                    <div id="resSkills" style="font-size:13px; line-height:1.8;"></div>
                </div>
                <div class="resume-main">
                    <h1 id="resName" style="margin:0; font-size:45px; text-transform:uppercase;"></h1>
                    <p id="resRole" style="font-size:20px; color:#666; font-weight:bold;"></p>
                    <h2>SUMMARY</h2>
                    <p id="resAbout" style="font-size:14px; line-height:1.6;"></p>
                    <h2>EXPERIENCE / PROJECTS</h2>
                    <div id="resProjects" style="font-size:14px; line-height:1.6; white-space:pre-line;"></div>
                </div>
            </div>
            <button class="btn" onclick="saveAsPDF()" style="background:#2ecc71; margin-top:30px;">DOWNLOAD PROFESSIONAL PDF 📄</button>
        </div>
    </div>

    <script>
        // Captcha Logic
        let code = Math.random().toString(36).substring(2, 7).toUpperCase();
        document.getElementById('captcha-display').innerText = code;

        function verifyAuth() {
            const user = document.getElementById('username').value;
            const cap = document.getElementById('captcha-in').value.toUpperCase();
            if(user && cap === code) {
                document.getElementById('master-body').classList.add('open');
            } else {
                alert("Auth Failed! Check Name/Captcha.");
            }
        }

        let photoData = "";
        function previewImg(e) {
            const reader = new FileReader();
            reader.onload = () => photoData = reader.result;
            reader.readAsDataURL(e.target.files[0]);
        }

        function buildResume() {
            document.getElementById('resName').innerText = document.getElementById('fName').value;
            document.getElementById('resRole').innerText = document.getElementById('fRole').value;
            document.getElementById('resAbout').innerText = document.getElementById('fAbout').value;
            document.getElementById('resProjects').innerText = document.getElementById('fProjects').value;
            
            const skills = document.getElementById('fSkills').value.split(',');
            const skillDiv = document.getElementById('resSkills');
            skillDiv.innerHTML = "";
            skills.forEach(s => skillDiv.innerHTML += `• ${s.trim()}<br>`);

            if(photoData) document.getElementById('resPhoto').src = photoData;
            
            document.getElementById('input-form').style.display = 'none';
            document.getElementById('resume-wrap').style.display = 'block';
        }

        function saveAsPDF() {
            const element = document.getElementById('resume-pdf');
            const opt = { margin: 0.5, filename: 'Portfolio_Elite.pdf', image: { type: 'jpeg', quality: 0.98 }, html2canvas: { scale: 2 }, jsPDF: { unit: 'in', format: 'letter', orientation: 'portrait' } };
            html2pdf().set(opt).from(element).save();
        }
    </script>
</body>
</html>
